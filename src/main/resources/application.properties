spring.application.name=story-service
server.port=8085

# Lokalne credentials (fallback kada Config Server nije dostupan)
spring.datasource.url=jdbc:mysql://localhost:3306/denga_stories?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Aktivni profil i Config Server (fallback na lokalne props ako nije dostupan)
spring.profiles.active=dev
spring.config.import=optional:configserver:http://localhost:8888
